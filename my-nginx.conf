map $http_cookie $is_auth {
    default 0;
    "~*access_token=[^;]+" 1;
}

server {
    listen 80;
    server_name 192.168.0.10;
    client_max_body_size 50M;
    
    root /usr/share/nginx/html;

    # API (без изменений)
    location ~ ^/(students|teachers|login|logout|groups|api|setup_database|admins) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # Админская страница - ТОЛЬКО ДЛЯ АДМИНОВ (проверка через API)
    location = /12.html {
        # Проверяем роль через бэкенд
        auth_request /auth/check-admin;
        auth_request_set $auth_status $upstream_status;
        
        error_page 401 403 = @auth_error;
        
        try_files $uri =404;
    }
    
    # Внутренний запрос для проверки роли админа
    location = /auth/check-admin {
        internal;
        proxy_pass http://backend:8000/api/check-role/admin;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Обработка ошибки авторизации
    location @auth_error {
        return 302 /1.html;
    }

    # Учительские страницы
    location ~ ^/(11|6|7|8|9|10)\.html$ {
        if ($is_auth = 0) {
            return 302 /1.html;
        }
        try_files $uri =404;
    }

    # Студенческие страницы
    location ~ ^/(3|4|5)\.html$ {
        if ($is_auth = 0) {
            return 302 /1.html;
        }
        try_files $uri =404;
    }

    # Публичные страницы
    location = /1.html {
        try_files $uri =404;
    }

    # Статика
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Корень
    location / {
        if ($is_auth = 1) {
            rewrite ^/$ /3.html break;
        }
        rewrite ^/$ /1.html break;
        try_files $uri $uri/index.html /1.html =404;
    }
}