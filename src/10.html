<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DPADIO — Профиль учителя</title>
    <link rel="stylesheet" href="10.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="window header">
        <div class="title">DPADIO</div>

        <div class="nav">
            <a href="11.html">ГЛАВНАЯ</a>
            <a href="6.html">ПРОВЕРКА</a>
            <a href="7.html">СОЗДАТЬ</a>
            <a href="10.html">ПРОФИЛЬ</a>
            <a href="1.html" id="logout-btn">ВЫХОД</a>
        </div>

        <div class="user">
            ПРЕПОДАВАТЕЛЬ — <span id="teacher-name">Загрузка...</span>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="window">

        <h2 class="section-title">ПРОФИЛЬ ПРЕПОДАВАТЕЛЯ</h2>

        <div class="profile">

            <div class="avatar"></div>

            <div class="info" id="profile-info">
                <div class="row">
                    <span class="label">Логин:</span>
                    <span class="value" id="profile-login">—</span>
                </div>

                <div class="row">
                    <span class="label">Email:</span>
                    <span class="value" id="profile-email">—</span>
                </div>

                <div class="row">
                    <span class="label">Мои группы:</span>
                    <span class="value" id="profile-groups">—</span>
                </div>

                <div class="row">
                    <span class="label">Имя:</span>
                    <span class="value" id="profile-first-name">—</span>
                </div>

                <div class="row">
                    <span class="label">Фамилия:</span>
                    <span class="value" id="profile-second-name">—</span>
                </div>

                <div class="row">
                    <span class="label">Отчество:</span>
                    <span class="value" id="profile-middle-name">—</span>
                </div>
            </div>

        </div>

    </div>

</div>

<script src="teacher-profile.js"></script>

</body>
</html>
